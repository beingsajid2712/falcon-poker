<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Poker - Team Estimation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --primary-light: #DBEAFE;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --white: #FFFFFF;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Join Screen */
        .join-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
        }

        .join-container {
            background: var(--white);
            border-radius: 16px;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.75rem;
        }

        .brand h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .brand p {
            color: var(--gray-500);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
            font-size: 0.875rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--gray-300);
            background: var(--white);
            color: var(--gray-900);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .button-group.full {
            grid-template-columns: 1fr;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Game Screen */
        .game-screen {
            display: none;
            min-height: 100vh;
        }

        .navbar {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 1rem 2rem;
            box-shadow: var(--shadow-sm);
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .navbar-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #7C3AED);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1.25rem;
        }

        .navbar-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .navbar-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .share-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--gray-100);
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .share-link-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .share-link-text {
            font-size: 0.875rem;
            color: var(--gray-600);
            font-family: monospace;
        }

        .copy-btn {
            padding: 0.375rem 0.75rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: var(--primary-hover);
        }

        .copy-btn.copied {
            background: var(--success);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--gray-100);
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-name {
            font-weight: 500;
            color: var(--gray-700);
            font-size: 0.875rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.5rem;
        }

        /* Voting Panel */
        .voting-panel {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }

        .panel-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .panel-subtitle {
            color: var(--gray-500);
            font-size: 0.875rem;
        }

        .vote-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: var(--gray-50);
            border-radius: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-400);
        }

        .status-indicator.active {
            background: var(--success);
        }

        .vote-status-text {
            font-size: 0.875rem;
            color: var(--gray-600);
            font-weight: 500;
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .card {
            aspect-ratio: 2/3;
            background: var(--white);
            border: 2px solid var(--gray-300);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--gray-700);
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .card.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--white);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        /* Results */
        .results-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--gray-200);
        }

        .results-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .results-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.75rem;
        }

        .consensus-badge {
            display: inline-block;
            padding: 0.375rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .consensus-badge.agreed {
            background: #D1FAE5;
            color: #065F46;
        }

        .consensus-badge.partial {
            background: #FEF3C7;
            color: #92400E;
        }

        .consensus-badge.disagreed {
            background: #FEE2E2;
            color: #991B1B;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--gray-50);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
        }

        .vote-distribution {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .vote-chip {
            background: var(--gray-100);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
        }

        .vote-chip .value {
            color: var(--primary);
            font-weight: 600;
        }

        /* Participants Panel */
        .participants-panel {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
        }

        .participants-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .participants-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .participants-count {
            background: var(--gray-100);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-600);
        }

        .participants-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .participant {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--gray-50);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .participant-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .participant-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667EEA, #764BA2);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .participant.host .participant-avatar {
            background: linear-gradient(135deg, var(--primary), #7C3AED);
        }

        .participant-details {
            flex: 1;
        }

        .participant-name {
            font-weight: 500;
            color: var(--gray-900);
            font-size: 0.875rem;
        }

        .host-label {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }

        .participant-vote {
            font-weight: 600;
            font-size: 1.125rem;
        }

        .participant-vote.voted {
            color: var(--success);
        }

        .participant-vote.pending {
            color: var(--gray-400);
        }

        .participant-vote.revealed {
            color: var(--primary);
        }

        /* Control Buttons */
        .control-section {
            margin-top: 2rem;
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .btn-reveal {
            background: var(--success);
            color: var(--white);
        }

        .btn-reveal:hover {
            background: #059669;
        }

        .btn-reset {
            background: var(--primary);
            color: var(--white);
        }

        .btn-reset:hover {
            background: var(--primary-hover);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .navbar-info {
                flex-direction: column;
                align-items: flex-end;
                gap: 0.5rem;
            }

            .share-section {
                flex-direction: column;
                align-items: stretch;
            }
        }

        @media (max-width: 640px) {
            .join-container {
                padding: 2rem;
            }

            .navbar {
                padding: 1rem;
            }

            .navbar-content {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .container {
                padding: 1rem;
            }

            .cards-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.75rem;
            }

            .card {
                font-size: 1.25rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .hidden {
            display: none !important;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--gray-900);
            color: var(--white);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast-success {
            background: var(--success);
        }
    </style>
</head>
<body>
    <!-- Join Screen -->
    <div class="join-screen" id="joinScreen">
        <div class="join-container">
            <div class="brand">
                <div class="brand-icon">📊</div>
                <h1>Planning Poker</h1>
                <p>Collaborative Team Estimation</p>
            </div>

            <div id="roomInviteNotice" class="hidden" style="background: #DBEAFE; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border-left: 4px solid #2563EB;">
                <p style="font-size: 0.875rem; color: #1E40AF; margin: 0;">
                    <strong>Room Invitation</strong><br>
                    You've been invited to join room: <strong id="inviteRoomCode"></strong>
                </p>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="userName">Your Name</label>
                <input type="text" id="userName" class="form-input" placeholder="Enter your name" autocomplete="off">
            </div>
            
            <div class="form-group hidden" id="roomCodeGroup">
                <label class="form-label" for="roomCode">Room Code</label>
                <input type="text" id="roomCode" class="form-input" placeholder="Enter room code" autocomplete="off">
            </div>
            
            <div class="button-group" id="initialButtons">
                <button class="btn btn-secondary" id="createRoomBtn">Create Room</button>
                <button class="btn btn-primary" id="showJoinBtn">Join Room</button>
            </div>
            
            <div class="button-group hidden" id="joinButtons">
                <button class="btn btn-secondary" id="backBtn">← Back</button>
                <button class="btn btn-primary" id="joinBtn">Join</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-brand">
                    <div class="navbar-icon">📊</div>
                    <span class="navbar-title">Planning Poker</span>
                </div>
                <div class="navbar-info">
                    <div class="share-section" id="shareSection">
                        <div class="share-link-container">
                            <span class="share-link-text" id="shareLink">...</span>
                        </div>
                        <button class="copy-btn" id="copyLinkBtn">Copy Link</button>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <span class="user-name" id="displayUserName">User</span>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="main-grid">
                <!-- Voting Area -->
                <div class="voting-panel">
                    <div class="panel-header">
                        <h2 class="panel-title">Cast Your Vote</h2>
                        <p class="panel-subtitle">Select a card to estimate the story complexity</p>
                        <div class="vote-status">
                            <span class="status-indicator" id="statusIndicator"></span>
                            <span class="vote-status-text" id="votingStatus">Waiting for votes...</span>
                        </div>
                    </div>

                    <div class="cards-grid" id="cardsContainer">
                        <!-- Cards generated dynamically -->
                    </div>

                    <div id="resultsSection" class="results-section hidden">
                        <div class="results-header">
                            <h3 class="results-title">Voting Results</h3>
                            <span class="consensus-badge" id="consensusBadge">Agreed</span>
                        </div>

                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Average</div>
                                <div class="stat-value" id="averageValue">0</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Minimum</div>
                                <div class="stat-value" id="minValue">0</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Maximum</div>
                                <div class="stat-value" id="maxValue">0</div>
                            </div>
                        </div>

                        <div class="vote-distribution" id="voteDistribution"></div>
                    </div>

                    <div class="control-section">
                        <button class="btn btn-reveal hidden" id="revealBtn">Reveal Votes</button>
                        <button class="btn btn-reset hidden" id="resetBtn">New Round</button>
                    </div>
                </div>

                <!-- Participants Panel -->
                <div class="participants-panel">
                    <div class="participants-header">
                        <h3 class="participants-title">Participants</h3>
                        <span class="participants-count" id="participantCount">0</span>
                    </div>
                    <div class="participants-list" id="participantList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span id="toastMessage">Link copied!</span>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDw80dPogQMmJTdMOK6seYBC6h-NoQPTZs",
            authDomain: "falcon-poker.firebaseapp.com",
            databaseURL: "https://falcon-poker-default-rtdb.firebaseio.com",
            projectId: "falcon-poker",
            storageBucket: "falcon-poker.firebasestorage.app",
            messagingSenderId: "779391976518",
            appId: "1:779391976518:web:358d3eaa73b768b224b647",
            measurementId: "G-2F154GC59N"
        };

        const isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

        let db = null;

        // Initialize Firebase
        if (isFirebaseConfigured) {
            import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js').then(({ initializeApp }) => {
                return import('https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js').then(({ getDatabase, ref, set, get, onValue, update, remove }) => {
                    const app = initializeApp(firebaseConfig);
                    db = getDatabase(app);
                    
                    window.firebaseDB = {
                        ref,
                        set,
                        get,
                        onValue,
                        update,
                        remove,
                        database: db
                    };
                    
                    console.log('✓ Firebase initialized');
                    
                    // Check for room code in URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const roomCode = urlParams.get('room');
                    if (roomCode) {
                        // Show invite notice
                        const inviteNotice = document.getElementById('roomInviteNotice');
                        const inviteRoomCode = document.getElementById('inviteRoomCode');
                        inviteNotice.classList.remove('hidden');
                        inviteRoomCode.textContent = roomCode;
                        
                        // Pre-fill room code
                        document.getElementById('roomCode').value = roomCode;
                        
                        // Auto-click "Join Room" to show the room code field
                        setTimeout(() => {
                            document.getElementById('showJoinBtn').click();
                            document.getElementById('userName').focus();
                        }, 100);
                    }
                });
            }).catch(error => {
                console.error('Failed to initialize Firebase:', error);
                alert('Firebase initialization failed. Please check your configuration.');
            });
        }

        // State
        const FIBONACCI = [1, 2, 3, 5, 8, 13, 21];
        
        let state = {
            currentUser: null,
            roomCode: null,
            isHost: false,
            selectedVote: null,
            votesRevealed: false,
            sessionId: null
        };

        let roomListener = null;

        // Utilities
        function generateRoomCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function generateSessionId() {
            return Date.now() + '-' + Math.random().toString(36).substring(2, 9);
        }

        function getRoomLink(roomCode) {
            const baseUrl = window.location.origin + window.location.pathname;
            return `${baseUrl}?room=${roomCode}`;
        }

        function showToast(message, type = 'default') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = 'toast show';
            if (type === 'success') {
                toast.classList.add('toast-success');
            }
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Copy link functionality
        document.getElementById('copyLinkBtn').addEventListener('click', async () => {
            const link = document.getElementById('shareLink').textContent;
            try {
                await navigator.clipboard.writeText(link);
                const btn = document.getElementById('copyLinkBtn');
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                showToast('Link copied to clipboard!', 'success');
                
                setTimeout(() => {
                    btn.textContent = 'Copy Link';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (error) {
                showToast('Failed to copy link');
            }
        });

        // Initialize cards
        function initializeCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            FIBONACCI.forEach(value => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = value;
                card.dataset.value = value;
                
                card.addEventListener('click', () => handleVote(value));
                container.appendChild(card);
            });
        }

        // Handle vote
        async function handleVote(value) {
            if (state.votesRevealed) return;
            
            document.querySelectorAll('.card').forEach(card => {
                card.classList.toggle('selected', card.dataset.value == value);
            });
            
            state.selectedVote = value;
            
            if (window.firebaseDB && state.roomCode && state.sessionId) {
                const { ref, update, database } = window.firebaseDB;
                const participantRef = ref(database, `rooms/${state.roomCode}/participants/${state.sessionId}`);
                
                try {
                    await update(participantRef, {
                        vote: value,
                        hasVoted: true
                    });
                } catch (error) {
                    console.error('Error updating vote:', error);
                }
            }
        }

        // Reveal votes
        async function revealVotes() {
            if (window.firebaseDB && state.roomCode) {
                const { ref, update, database } = window.firebaseDB;
                const roomRef = ref(database, `rooms/${state.roomCode}`);
                
                try {
                    await update(roomRef, {
                        votesRevealed: true
                    });
                } catch (error) {
                    console.error('Error revealing votes:', error);
                }
            }
        }

        // Reset round
        async function resetRound() {
            if (window.firebaseDB && state.roomCode) {
                const { ref, get, update, database } = window.firebaseDB;
                const roomRef = ref(database, `rooms/${state.roomCode}`);
                
                try {
                    const snapshot = await get(roomRef);
                    if (snapshot.exists()) {
                        const room = snapshot.val();
                        
                        const updates = {
                            votesRevealed: false
                        };
                        
                        if (room.participants) {
                            Object.keys(room.participants).forEach(sessionId => {
                                updates[`participants/${sessionId}/vote`] = null;
                                updates[`participants/${sessionId}/hasVoted`] = false;
                            });
                        }
                        
                        await update(roomRef, updates);
                        
                        state.selectedVote = null;
                        document.querySelectorAll('.card').forEach(card => {
                            card.classList.remove('selected');
                        });
                    }
                } catch (error) {
                    console.error('Error resetting round:', error);
                }
            }
        }

        // Calculate results
        function calculateResults(participants) {
            const votes = Object.values(participants || {})
                .filter(p => p.hasVoted && p.vote !== null)
                .map(p => p.vote);
            
            if (votes.length === 0) {
                return {
                    average: 0,
                    min: 0,
                    max: 0,
                    consensus: 'disagreed',
                    distribution: {}
                };
            }
            
            const average = votes.reduce((a, b) => a + b, 0) / votes.length;
            const min = Math.min(...votes);
            const max = Math.max(...votes);
            
            let consensus;
            if (min === max) {
                consensus = 'agreed';
            } else if (max - min <= 3) {
                consensus = 'partial';
            } else {
                consensus = 'disagreed';
            }
            
            const distribution = {};
            votes.forEach(vote => {
                distribution[vote] = (distribution[vote] || 0) + 1;
            });
            
            return { average, min, max, consensus, distribution };
        }

        // Update UI
        function updateUIFromRoom(room) {
            if (!room) return;
            
            const participants = room.participants || {};
            const participantList = document.getElementById('participantList');
            const participantCount = document.getElementById('participantCount');
            
            participantCount.textContent = Object.keys(participants).length;
            participantList.innerHTML = '';
            
            Object.entries(participants).forEach(([sessionId, participant]) => {
                const div = document.createElement('div');
                div.className = 'participant';
                if (participant.isHost) div.classList.add('host');
                
                const avatar = participant.name.charAt(0).toUpperCase();
                
                let voteDisplay;
                if (room.votesRevealed && participant.hasVoted) {
                    voteDisplay = `<span class="participant-vote revealed">${participant.vote}</span>`;
                } else if (participant.hasVoted) {
                    voteDisplay = '<span class="participant-vote voted">✓</span>';
                } else {
                    voteDisplay = '<span class="participant-vote pending">—</span>';
                }
                
                div.innerHTML = `
                    <div class="participant-info">
                        <div class="participant-avatar">${avatar}</div>
                        <div class="participant-details">
                            <div class="participant-name">
                                ${participant.name}
                                ${participant.isHost ? '<span class="host-label">Host</span>' : ''}
                            </div>
                        </div>
                    </div>
                    ${voteDisplay}
                `;
                
                participantList.appendChild(div);
            });
            
            // Update voting status
            const votedCount = Object.values(participants).filter(p => p.hasVoted).length;
            const totalCount = Object.keys(participants).length;
            const statusIndicator = document.getElementById('statusIndicator');
            const votingStatus = document.getElementById('votingStatus');
            
            votingStatus.textContent = `${votedCount} of ${totalCount} voted`;
            
            if (votedCount === totalCount && totalCount > 0) {
                statusIndicator.classList.add('active');
            } else {
                statusIndicator.classList.remove('active');
            }
            
            // Update selected card
            if (state.sessionId && participants[state.sessionId]) {
                const currentParticipant = participants[state.sessionId];
                if (currentParticipant.hasVoted && !room.votesRevealed) {
                    document.querySelectorAll('.card').forEach(card => {
                        card.classList.toggle('selected', card.dataset.value == currentParticipant.vote);
                    });
                    state.selectedVote = currentParticipant.vote;
                } else if (room.votesRevealed) {
                    document.querySelectorAll('.card').forEach(card => {
                        card.classList.remove('selected');
                    });
                }
            }
            
            state.votesRevealed = room.votesRevealed || false;
            
            // Control buttons
            const revealBtn = document.getElementById('revealBtn');
            const resetBtn = document.getElementById('resetBtn');
            const resultsSection = document.getElementById('resultsSection');
            
            if (state.isHost) {
                if (!room.votesRevealed && votedCount > 0) {
                    revealBtn.classList.remove('hidden');
                    resetBtn.classList.add('hidden');
                } else if (room.votesRevealed) {
                    revealBtn.classList.add('hidden');
                    resetBtn.classList.remove('hidden');
                } else {
                    revealBtn.classList.add('hidden');
                    resetBtn.classList.add('hidden');
                }
            }
            
            // Results
            if (room.votesRevealed) {
                resultsSection.classList.remove('hidden');
                const results = calculateResults(participants);
                
                document.getElementById('averageValue').textContent = results.average.toFixed(1);
                document.getElementById('minValue').textContent = results.min;
                document.getElementById('maxValue').textContent = results.max;
                
                const consensusBadge = document.getElementById('consensusBadge');
                consensusBadge.className = `consensus-badge ${results.consensus}`;
                consensusBadge.textContent = 
                    results.consensus === 'agreed' ? 'Full Consensus' :
                    results.consensus === 'partial' ? 'Partial Consensus' :
                    'Divergent Estimates';
                
                const distDiv = document.getElementById('voteDistribution');
                distDiv.innerHTML = '';
                Object.entries(results.distribution)
                    .sort((a, b) => Number(a[0]) - Number(b[0]))
                    .forEach(([value, count]) => {
                        const chip = document.createElement('div');
                        chip.className = 'vote-chip';
                        chip.innerHTML = `<span class="value">${value}</span> × ${count}`;
                        distDiv.appendChild(chip);
                    });
            } else {
                resultsSection.classList.add('hidden');
            }
        }

        // Join session
        async function joinSession(createNew = false) {
            try {
                const userName = document.getElementById('userName').value.trim();
                const roomCodeInput = document.getElementById('roomCode').value.trim().toUpperCase();
                
                if (!userName) {
                    alert('Please enter your name');
                    return;
                }

                if (!window.firebaseDB) {
                    alert('Firebase is not configured. Please add your Firebase config.');
                    return;
                }
                
                const { ref, get, set, onValue, database } = window.firebaseDB;
                
                let roomCode;
                let isHost = false;
                
                state.sessionId = generateSessionId();
                
                if (createNew) {
                    roomCode = generateRoomCode();
                    isHost = true;
                    
                    const roomRef = ref(database, `rooms/${roomCode}`);
                    await set(roomRef, {
                        code: roomCode,
                        votesRevealed: false,
                        createdAt: Date.now(),
                        participants: {
                            [state.sessionId]: {
                                name: userName,
                                sessionId: state.sessionId,
                                isHost: true,
                                vote: null,
                                hasVoted: false,
                                joinedAt: Date.now()
                            }
                        }
                    });
                } else {
                    if (!roomCodeInput) {
                        alert('Please enter a room code');
                        return;
                    }
                    
                    roomCode = roomCodeInput;
                    const roomRef = ref(database, `rooms/${roomCode}`);
                    const snapshot = await get(roomRef);
                    
                    if (!snapshot.exists()) {
                        alert('Room "' + roomCode + '" not found. Please check the code.');
                        return;
                    }
                    
                    const participantRef = ref(database, `rooms/${roomCode}/participants/${state.sessionId}`);
                    
                    await set(participantRef, {
                        name: userName,
                        sessionId: state.sessionId,
                        isHost: false,
                        vote: null,
                        hasVoted: false,
                        joinedAt: Date.now()
                    });
                }
                
                state.currentUser = userName;
                state.roomCode = roomCode;
                state.isHost = isHost;
                
                // Update UI
                document.getElementById('displayUserName').textContent = userName;
                document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
                
                // Set shareable link
                const roomLink = getRoomLink(roomCode);
                document.getElementById('shareLink').textContent = roomLink;
                
                // Show game screen
                document.getElementById('joinScreen').classList.add('hidden');
                document.getElementById('gameScreen').style.display = 'block';
                
                initializeCards();
                
                // Listen to room changes
                const roomRef = ref(database, `rooms/${roomCode}`);
                roomListener = onValue(roomRef, (snapshot) => {
                    const room = snapshot.val();
                    if (room) {
                        updateUIFromRoom(room);
                    }
                });
                
                console.log('✓ Joined room:', roomCode);
                
                if (isHost) {
                    showToast('Room created! Share the link above with your team.', 'success');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred: ' + error.message);
            }
        }

        // UI Controls
        function showJoinForm() {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert('Please enter your name first');
                return;
            }
            
            document.getElementById('roomCodeGroup').classList.remove('hidden');
            document.getElementById('initialButtons').classList.add('hidden');
            document.getElementById('joinButtons').classList.remove('hidden');
            document.getElementById('roomCode').focus();
        }

        function goBack() {
            document.getElementById('roomCodeGroup').classList.add('hidden');
            document.getElementById('initialButtons').classList.remove('hidden');
            document.getElementById('joinButtons').classList.add('hidden');
            document.getElementById('roomCode').value = '';
        }

        // Event listeners
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert('Please enter your name first');
                return;
            }
            joinSession(true);
        });
        
        document.getElementById('showJoinBtn').addEventListener('click', showJoinForm);
        document.getElementById('backBtn').addEventListener('click', goBack);
        document.getElementById('joinBtn').addEventListener('click', () => joinSession(false));
        
        document.getElementById('userName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const userName = document.getElementById('userName').value.trim();
                if (userName) {
                    joinSession(true);
                }
            }
        });
        
        document.getElementById('roomCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinSession(false);
        });
        
        document.getElementById('revealBtn').addEventListener('click', revealVotes);
        document.getElementById('resetBtn').addEventListener('click', resetRound);
        
        document.getElementById('userName').focus();
    </script>
</body>
</html>
